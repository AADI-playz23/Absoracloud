<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Absoracloud — Free Web, Cloud & Minecraft Hosting | Absora</title>
  <meta name="description" content="Absoracloud is a free multi-service cloud hosting platform by Absora. Offering web hosting, Minecraft servers, VPS, cloud storage, and DevBox terminal. Built by AADI-playz23." />
  <meta name="keywords" content="Absoracloud, Absora, free hosting, cloud hosting, Minecraft hosting, VPS, web hosting, AADI-playz23, Aadarsh Pandey, India" />
  <meta name="author" content="Aadarsh Pandey" />
  <meta name="robots" content="index, follow" />

  <!-- Redirect after 3 seconds -->
  <meta http-equiv="refresh" content="3;url=https://absoracloud.iblogger.org" />

  <!-- Canonical -->
  <link rel="canonical" href="https://aadi-playz23.github.io/Absoracloud/" />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Absoracloud",
    "url": "https://absoracloud.iblogger.org",
    "description": "Absoracloud is a free multi-service cloud hosting platform by Absora — web hosting, Minecraft servers, VPS, cloud storage.",
    "author": {
      "@type": "Person",
      "name": "Aadarsh Pandey",
      "alternateName": "AADI-playz23",
      "url": "https://github.com/AADI-playz23"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      background: #111;
      max-width: 420px;
      width: 90%;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #00b4ff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .logo span { color: #fff; }

    .tagline {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .redirecting {
      font-size: 12px;
      color: #444;
      margin-bottom: 20px;
    }

    .redirecting b { color: #00b4ff; }

    /* Progress bar */
    .bar-wrap {
      width: 100%;
      height: 2px;
      background: #1f1f1f;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .bar {
      height: 100%;
      background: #00b4ff;
      width: 0%;
      animation: fill 3s linear forwards;
    }

    @keyframes fill { to { width: 100%; } }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #00b4ff;
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 4px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .footer {
      margin-top: 28px;
      font-size: 10px;
      color: #333;
    }

    .footer a { color: #444; text-decoration: none; }
    .footer a:hover { color: #00b4ff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Absora<span>cloud</span></div>
    <div class="tagline">Free Cloud Hosting by Absora</div>

    <div class="redirecting">Redirecting you to <b>absoracloud.iblogger.org</b>...</div>

    <div class="bar-wrap">
      <div class="bar"></div>
    </div>

    <a class="btn" href="https://absoracloud.iblogger.org">Go Now →</a>

    <div class="footer">
      Built by <a href="https://github.com/AADI-playz23">AADI-playz23</a> · 
      <a href="https://aadi-playz23.github.io/AADI-playz23/">Absora</a>
    </div>
  </div>
</body>
</html>
